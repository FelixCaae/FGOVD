data:
  images_path: ./coco/
  test_annotations_file: ../validation_sets/1_attributes.json
  train_annotations_file: ../training_sets/1_attributes.json
training:
  base_model:  ../weights/owlv2-base-patch16
  batch_size: 4 # per gpu 
  val_batch_size: 2 # per gpu
  learning_rate: 3e-5
  ltype: triplet
  margin: 0.15
  n_accumulation_steps: 2
  n_epochs: 5
  n_hardnegatives: 10
  self_distillation: mse
  weight_decay: 0.1
